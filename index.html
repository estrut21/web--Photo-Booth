<!DOCTYPE html>
<html lang="en">
    <head>
     <meta charset="UTF-8" />
     <meta name="viewport" content="width=device-width, initial-scale=1.0" />
     <title>Photo Booth</title>
     <link rel="preconnect" href="https://fonts.googleapis.com" />
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
     <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
     <style>
        :root{
            --curtain: #7a1420;
            --curtain-deep: #520c14;
            --cream: #f4e8d0;
            --brass: #d9a441;
            --brass-bright: #f3c969;
            --bulb-off: #6b4a1e;
         }
         * { box-sizing: border-box; margin: 0; padding: 0; }
         body {
            font-family: 'JetBrains Mono', monospace;
            color: var(--cream);
            min-height: 100vh;
            background:
                radial-gradient(ellipse at 50% -10%, #9c2030 0%, transparent 55%),
                repeating-linear-gradient(90deg, var(--curtain) 0px, var(--curtain) 38px, var(--curtain-deep) 38px, var(--curtain-deep) 78px),
                var(--curtain-deep);
                display: flex;
                flex-direction: column;
                align-items: center;
                padding: 28px 16px 60px;
         }
        .sign { text-align: center; position: relative; padding: 14px 30px 18px; margin-bottom: 6px; }
        .bulbs {
            position: absolute; inset: 0;
            border: 4px solid var(--brass);
            border-radius: 10px;
            box-shadow: 0 0 0 4px var(--curtain-deep), 0 8px 30px rgba(0, 0, 0, 0.5); 
        }
        .bulbs {
            position: absolute; inset: 0;
            border: 4px solid var(--brass);
            border-radius: 10px;
            box-shadow: 0 0 0 4px var(--curtain-deep), 0 8px 30px rgba(0, 0, 0, 0.5); 
        }
        @keyframes twinkle { 0%,100% { opacity: 1; } 50% { opacity: 0.25; } }
        h1 {
            font-family: 'Monoton', cursive;
            font-size: clamp(2.1rem, 7vw, 4rem);
            color: var(--brass-bright);
            text-shadow: 0 0 14px rgba(243,201,105,.7), 0 3px 0 #5a3a10;
            letter-spacing: 2px; line-height: 1;
        }
        .tagline { margin-top: 8px; font-size: .7rem; letter-spacing: 5px; text-transform: uppercase; color: var(--cream); opacity: 0.8; }
        .booth {
            background: linear-gradient(180deg, #241a13, #170f0a);
            border: 3px solid var(--brass); border-radius: 16px; padding: 18px; margin-top: 22px;
            width: min(560px, 100%);
            box-shadow: 0 18px 50px rgba(0, 0, 0, 0.55), inset 0 0 0 6px var(--curtain-deep);
        }

        .screen { position: relative; background: #000; border-radius: 10px; overflow: hidden; aspect-ratio: 4 / 3; border: 2px solid var(--brass); }
        video, #capture-canvas { display: none; }
        .countdown {
            position: absolute; inset: 0; display: none; align-items: center; justify-content: center;
            font-family: 'Monoton', cursive; font-size: 8rem; color: var(--brass-bright);
            text-shadow: 0 0 30px rgba(0,0,0,0.8); background: rgba(0,0,0,0.25);
        }
        .countdown.show { display: flex; }
        .countdown .num { animation: pop .85s ease-out; }
        @keyframes pop { 0%{transform: scale(.3);opacity:0} 40%{transform:scale(1.15);opacity:1} 100%{transform:scale(1);opacity: 0.9} }
        .flash { position: absolute; inset: 0; background: #fff; opacity: 0; pointer-events: none; }
        .flash.fire { animation: flash 0.5s ease-out; }
        @keyframes flash { 0%{opacity:0.95} 100%{opacity:0} }
        .status { position: absolute; left: 0; right: 0; bottom: 0; text-align: center; padding: 8px; font-size: .72rem; letter-spacing: 1px; background: rgba(0,0,0,0.55); color: var(--cream); }
        .label { font-size: .68rem; letter-spacing: 3px; text-transform: uppercase; color: var(--brass); margin: 18px 2px 8px; }
        .filters { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; }
        .filters button {
            flex: 0 0 auto; cursor: pointer; font-family: inherit; font-size: .72rem;
            padding: 8px 12px; border-radius: 20px; border: 1.5px mnsolid var(--brass);
            background: transparent; color: var(--cream); transition: all 0.15s; white-space: nowrap;
        }
        .filters button:hover { background: rgba(217,164,65,.15) ; }
        .filters button.active {background: var(--brass); color: var(--ink); font-weight: 700; }
        .controls {display: flex; gap: 12px; margin-top: 18px; }
        .btn {
            flex: 1; cursor: pointer; font-family: inherit; font-weight: 700; font-size: .85rem;
            letter-spacing: 1px; text-transform: uppercase; padding: 15px; border-radius: 10px; border: none; 
            transition: transform 0.1s, filter .15s;
        }
        .btn:active { transform: translateY(2px); }
        .btn:disabled { opacity: .4; cursor: not-allowed; }
        .btn-primary { background: var(--brass); color: var(--ink); box-shadow: 0 5px 0 #9c6f1e; }
        .btn-primary:hover:not(disabled) {filter: brightness(1.08); }
        .btn-ghost { background: transparent; color: var(--cream); border: 1.5px solid var(--brass); }
        .hint { text-align: center; font-size: .7rem; opacity: 0.7; margin-top: 14px; }
        .result { display: none; flex-direction: column; align-items: center; margin-top: 28px; }
        .result.show { display: flex; }
        #strip-canvas { max-width: 240px; width: 100%; border-radius: 4px; box-shadow: 0 14px 40px rgba(0,0,0,0.6); transform: rotate(-1.5deg); }
        .result .controls { width: min(360px, 100%); }
        a.btn { text-decoration: none; display: flex; align-items: center; justify-content: center; }
        

     </style>
    </head>
    <body>
        <div class="sign">
            <div class="screen">
                <h1>Photo Booth</h1>
                <div class="tagline">Smile &middot; Strike a pose &middot; Print</div>
            </div>

            <div class="booth" id="booth">
                <div class="screen">
                    <video id="video" autoplay playsinline muted></video>
                    <canvas id="capture-canvas"></canvas>
                    <div class="countdown" id="countdown"></div>
                    <div class="flash" id="flash"></div>
                    <div class="status" id="status">Tap "Start camera" to begin</div>
                </div>
                <div class="label">Pick a look</div>
                <div class="filters" id="filters"></div>
                <div class="controls">
                    <button class="btn btn-ghost" id="start-btn">Start Camera</button>
                    <button class="btn btn-primary" id="capture-btn" disabled>Take 4 Photos </button>
                </div>
                <div class="hint">4 quick photos become a classic strip you can download.</div>
                </div>

        <div class="result" id="result">
            <canvas id="strip-canvas"></canvas>
            <div class="controls">
                <a class="btn btn-primary" id="download-btn" downloads="photobooth-strip.png">Download Strip</a>
                <button class="btn btn-ghost" id="again-btn">Again!</button>
            </div>
        </div>

        <script>
            (() => {
                const video = document.getElementById('video');
                const cap = document.getElementById('capture-canvas');
                const strip = document.getElementById('strip-canvas');
                const countdownEl = document.getElementById('countdown');
                const flash = document.getElementById('flash');
                const status = document.getElementById('status');
                const startBtn = document.getElementById('start-btn');
                const shootBtn = document.getElementById('capture-btn');
                const dlBtn = document.getElementById('download-btn');
                const booth = document.getElementById('booth');
                const result = document.getElementById('result');

                const FILTERS = [
                    { name: 'Original', css: 'none' },
                    { name: 'B&W' , css: 'grayscale(1) contrast(1.1)'},
                    { name: 'Sepia', css: 'sepia(0.75) contrast(1.4) contrast(1.1) brightness(1.05)' },
                    { name: 'Vintage', css: 'sepia(0.45) saturate(1.4) contrast(1.1) brightness(1.05)' },
                    { name: 'Cool', css: 'saturate(1.3) hue-rotate(-12deg) brightness(1.05)' },
                    { name: 'Warm', css: 'sepia(0.25) saturate(1.5) hue-rotate(-8deg)' },
                    { name: 'Punch', css: 'contrast(1.5) saturate(1.6)' },
                    { name: 'Faded', css: 'contrast(0.85) brightness(1.15) sepia(0.8)' },
                ];
                let activeFilter = FILTERS[0];

                const filterBar = document.getElementById('filters');
                FILTERS.forEach(f, i)  {
                    const btn = document.createElement('button');
                    b.textContent = f.name;
                    if (i === 0) btn.classList.add('active');
                    b.onclick = () => {
                        activeFilter = f;
                        video.style.filter = f.css;
                        [...filterBar.children].forEach(c => c.classList.remove('active'));
                        b.classList.add('active');
                        };
                        filterBar.appendChild(b);
                    });

                    const bulbs = document.getElementById('bulbs');
                    for (let i = 0; i < 22; i++) {
                        const s = document.createElement('span');
                        const onTop = i < 11;
                        const pct = ((onTop ? i : i - 11) / 10) * 100;
                        s.style.left = `calc(${pct}% - 4px)`;
                        s.style[onTop ? 'top' : 'bottom'] = '-6px';
                        s.style.animationDelay = (i * 0.12) + 's';
                        bulbs.appendChild(s);
                    }

                    let stream = null;
                



            });
        </script>
    </body>
</html>
